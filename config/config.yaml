project:
  name: "Agent Gatsby"
  version: "0.1.0"
  environment: "local"
  description: "Local, citation-verified literary analysis and translation pipeline"

run:
  run_id: "agent_gatsby_default_run"
  timezone: "America/Chicago"
  fail_fast: true
  overwrite_outputs: true
  save_intermediate_artifacts: true

paths:
  repo_root: "."
  config_dir: "config"
  source_dir: "data/source"
  normalized_dir: "data/normalized"
  artifacts_dir: "artifacts"
  manifests_dir: "artifacts/manifests"
  evidence_dir: "artifacts/evidence"
  drafts_dir: "artifacts/drafts"
  final_dir: "artifacts/final"
  translations_dir: "artifacts/translations"
  qa_dir: "artifacts/qa"
  logs_dir: "artifacts/logs"
  outputs_dir: "outputs"
  fonts_dir: "fonts"

source:
  file_path: "data/source/gatsby_source.txt"
  normalized_output_path: "data/normalized/gatsby_locked.txt"
  manifest_output_path: "artifacts/manifests/source_manifest.json"
  encoding: "utf-8"
  preserve_chapter_markers: true
  collapse_excessive_blank_lines: true
  strip_leading_trailing_whitespace: true

logging:
  level: "INFO"
  log_to_console: true
  log_to_file: true
  file_path: "artifacts/logs/pipeline.log"
  include_timestamps: true
  include_stage_names: true

models:
  provider: "ollama_openai_compatible"
  endpoint: "http://localhost:11434/v1"
  api_key: "ollama"
  primary_reasoner: "gemma4:26b"
  final_critic: "gemma4:26b"
  translator_es: "gemma4:26b"
  translator_zh: "gemma4:26b"
  timeout_seconds: 180
  max_retries: 2
  retry_backoff_seconds: 3

llm_defaults:
  temperature: 0.2
  top_p: 0.9
  max_tokens: 4096
  response_format: "text"

prompts:
  extractor_prompt_path: "config/prompts/extractor.md"
  ledger_prompt_path: "config/prompts/ledger.md"
  outline_prompt_path: "config/prompts/outline.md"
  draft_prompt_path: "config/prompts/draft.md"
  critic_prompt_path: "config/prompts/critic.md"
  style_simplifier_prompt_path: "config/prompts/style_simplifier.md"
  translator_es_prompt_path: "config/prompts/translator_es.md"
  translator_es_cleanup_prompt_path: "config/prompts/translator_es_cleanup.md"
  translator_zh_prompt_path: "config/prompts/translator_zh.md"
  translator_zh_cleanup_prompt_path: "config/prompts/translator_zh_cleanup.md"
  qa_prompt_path: "config/prompts/translation_qa.md"
  final_forensic_audit_prompt_path: "config/prompts/final_forensic_audit.md"
  dynamic_validation_prompt_path: "config/prompts/dynamic_validation_critic.md"

indexing:
  output_path: "artifacts/manifests/passage_index.json"
  chapter_pattern: "^Chapter\\s+[IVXLC0-9]+"
  paragraph_split_strategy: "blank_line"
  remove_empty_paragraphs: true
  passage_id_format: "{chapter}.{paragraph}"

extraction:
  output_path: "artifacts/evidence/metaphor_candidates.json"
  raw_debug_output_path: "artifacts/evidence/metaphor_candidates_raw.txt"
  minimum_candidate_count: 8
  maximum_candidate_count: 25
  llm_transport: "ollama_native_chat"
  require_json_output: true
  include_confidence_scores: true
  include_exact_quote_strings: true

evidence_ledger:
  output_path: "artifacts/evidence/evidence_ledger.json"
  rejected_output_path: "artifacts/evidence/rejected_candidates.json"
  target_verified_record_count: 15
  require_exact_quote_match: true
  reject_missing_passage_ids: true
  reject_empty_rationales: true
  minimum_quote_length: 8
  status_for_verified_entries: "verified"

outline:
  output_path: "artifacts/drafts/outline.json"
  minimum_section_count: 12
  maximum_section_count: 12
  max_prompt_evidence_records: 32
  llm_transport: "ollama_native_chat"
  fixed_title: "An Analysis of Metaphors in The Great Gatsby"
  require_intro: true
  require_conclusion: true
  require_thesis: true
  require_evidence_ids_per_section: true

drafting:
  output_path: "artifacts/drafts/analysis_english_draft.md"
  section_drafts_dir: "artifacts/drafts/sections"
  final_output_path: "artifacts/drafts/analysis_english_final.md"
  master_output_path: "artifacts/final/analysis_english_master.md"
  llm_transport: "ollama_native_chat"
  expansion_pass_enabled: true
  expansion_pass_max_rounds: 3
  expansion_pass_min_increase_words: 60
  near_target_top_off_enabled: true
  near_target_top_off_tolerance_words: 120
  near_target_top_off_min_increase_words: 30
  expansion_pass_transport: "ollama_native_chat"
  timing_output_path: "artifacts/qa/english_draft_timing.json"
  target_word_count_min: 7360
  target_word_count_max: 8280
  fail_below_target_word_count: true
  estimated_page_target: 10
  words_per_page_estimate: 500
  write_section_by_section: true
  max_evidence_per_section: 4
  citation_format: "[{passage_id}]"
  display_citation_format: "[{citation_number}]"
  citation_appendix_heading: "Citations"
  citation_text_title: "Citation Text"
  citation_text_output_path: "artifacts/final/citation_text.md"
  context_window_paragraphs_before: 1
  context_window_paragraphs_after: 1
  preserve_direct_quotes: true
  forbid_invented_citations: true
  forbid_invented_quotes: true
  target_tone: "formal academic literary analysis"

verification:
  output_path: "artifacts/qa/english_verification_report.json"
  citation_registry_output_path: "artifacts/qa/citation_registry.json"
  english_master_regression_output_path: "artifacts/qa/english_master_regression_report.json"
  dynamic_validation_enabled: true
  dynamic_validation_max_defects: 20
  dynamic_validation_transport: "ollama_native_chat"
  llm_forensic_audit_enabled: true
  llm_forensic_blocklist_categories:
    - "system_leak"
    - "prompt_leak"
  llm_forensic_blocklist_patterns:
    - "Please provide the Spanish markdown fragment"
    - "professional academic copyediting standards described in your instructions"
  english_llm_forensic_audit_output_path: "artifacts/qa/english_llm_forensic_audit_report.json"
  spanish_llm_forensic_audit_output_path: "artifacts/qa/spanish_llm_forensic_audit_report.json"
  mandarin_llm_forensic_audit_output_path: "artifacts/qa/mandarin_llm_forensic_audit_report.json"
  english_master_required_terms:
    - "Valley of Ashes"
  english_master_forbidden_phrases:
    - "Valley of West"
    - "punctiliously manner"
    - "theragged edge"
    - "it actively populating the landscape"
    - "to fit an approximately ten-page assignment requirement"
    - "could be expanded with additional metaphor clusters if a longer study were desired"
    - "sea-change of color and voice"
    - "unreality of reality"
    - "This fragility becomes literal during the confrontation with Tom"
    - "physically breaks the carefully curated veneer"
    - "literally broken up like glass"
  fail_on_quote_mismatch: true
  fail_on_invalid_citation: true
  invalid_quote_rate_threshold: 0.0
  invalid_citation_rate_threshold: 0.0
  unsupported_claim_ratio_threshold: 0.10
  normalize_curly_quotes_for_matching: true
  require_all_citations_to_resolve: true

editorial:
  llm_transport: "ollama_native_chat"
  preserve_quotes: true
  preserve_citations: true
  forbid_new_evidence: true
  improve_transitions: true
  improve_topic_sentences: true
  improve_conclusion: true
  style_simplifier_enabled: false
  style_simplifier_transport: "ollama_native_chat"
  style_simplifier_min_words: 8
  style_simplifier_min_word_ratio: 0.90

translation:
  split_strategy: "heading_then_paragraph_group"
  max_chunk_chars: 5000
  post_edit_body: true
  preserve_headings: true
  preserve_citations: true
  preserve_quote_markers: true
  use_frozen_english_master_only: true

translation_outputs:
  spanish_output_path: "artifacts/translations/analysis_spanish_draft.md"
  mandarin_output_path: "artifacts/translations/analysis_mandarin_draft.md"
  spanish_qa_report_path: "artifacts/qa/spanish_qa_report.json"
  mandarin_qa_report_path: "artifacts/qa/mandarin_qa_report.json"
  mandarin_script: "simplified"

translation_qa:
  compare_heading_counts: true
  compare_citation_counts: true
  compare_quote_marker_counts: true
  fail_on_major_structural_mismatch: false
  save_reports: true

pdf:
  enabled: true
  page_size: "A4"
  margin_left_mm: 25
  margin_right_mm: 25
  margin_top_mm: 25
  margin_bottom_mm: 25
  default_font_size: 9
  heading_font_size: 13
  title_font_size: 15
  line_height: 5.5
  paragraph_spacing: 3
  title_spacing_after: 6
  heading_spacing_before: 6
  heading_spacing_after: 6
  citation_entry_spacing: 0
  section_min_following_sentences: 5
  paragraph_keep_together_max_sentences: 3
  english_font_regular: "NotoSans-Regular.ttf"
  english_font_bold: "NotoSans-Bold.ttf"
  spanish_font_regular: "NotoSans-Regular.ttf"
  spanish_font_bold: "NotoSans-Bold.ttf"
  mandarin_font_regular: "NotoSansSC-Regular.ttf"
  mandarin_default_font_size: 10.0
  mandarin_heading_font_size: 13.5
  mandarin_title_font_size: 15.0
  mandarin_line_height: 6.0
  english_pdf_path: "outputs/Gatsby_Analysis_English.pdf"
  spanish_pdf_path: "outputs/Gatsby_Analysis_Spanish.pdf"
  mandarin_pdf_path: "outputs/Gatsby_Analysis_Mandarin.pdf"
  english_page_count_min: 10
  english_page_count_max: 13
  spanish_page_count_min: 10
  spanish_page_count_max: 14
  mandarin_page_count_min: 9
  mandarin_page_count_max: 13

manifest:
  output_path: "outputs/final_manifest.json"
  include_source_hash: true
  include_model_names: true
  include_config_snapshot: true
  include_output_file_paths: true
  include_qa_reports: true

testing:
  run_unit_tests: true
  run_smoke_test: true
  tests_dir: "tests"
  pytest_command: "pytest -q"

orchestration:
  supported_stages:
    - "ingest"
    - "normalize"
    - "index"
    - "extract_metaphors"
    - "build_evidence_ledger"
    - "plan_outline"
    - "draft_english"
    - "verify_english"
    - "critique_english"
    - "freeze_english"
    - "translate_spanish"
    - "qa_spanish"
    - "translate_mandarin"
    - "qa_mandarin"
    - "render_pdfs"
    - "write_manifest"
  allow_single_stage_runs: true
  allow_full_run: true
